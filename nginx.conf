server {
    listen 80;
    server_name candidate.ratchetup.ai ratchetup.ai ratchetup.org ratchetup.io;

    root /usr/share/nginx/html;
    index index.html;

    location /.well-known/ {
        root /usr/share/nginx/html;
        try_files $uri =404;
    }

    location / {
        try_files $uri /index.html;
    }

    error_page 404 /index.html;

    location /static/ {
        root /usr/share/nginx/html;
    }

    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg|mp4|webm|ogv|wav|mp3|ogg|m4a|aac)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }
}
